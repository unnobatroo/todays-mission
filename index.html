<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>TODAY'S MISSION</title>
</head>

<body data-theme="j-mode">
    <div class="window">
        <div class="title-bar">
            <span>TODAY'S MISSION</span>
            <button class="switch" id="themeToggle" aria-label="Toggle theme" type="button">
                <i id="theme-icon" class="fa-solid fa-book"></i>
            </button>
        </div>
        <div class="box">
            <p id="activity">Decoding...</p>
            <button class="delete" id="deleteCurrentBtn" type="button">Delete</button>
            <button id="randomTaskBtn" type="button">New Task</button>
        </div>
        <div class="box">
            <input type="text" id="newActivity" placeholder="Enter your command">
            <button id="uploadTaskBtn" type="button">Upload</button>
            <button class="purge" id="purgeTasksBtn" type="button">Purge</button>
        </div>
        <ul id="addedActivities"></ul>
        <div id="alert" class="alert">Task uploaded successfully.</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
